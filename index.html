<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>F1 2026 - Monaco Pro TV</title>
    <style>
        @font-face { font-family: 'F1-Bold'; src: url('Formula1-Bold-4.ttf'); }
        @font-face { font-family: 'F1-Regular'; src: url('Formula1-Regular-1.ttf'); }
        @font-face { font-family: 'F1-Wide'; src: url('Formula1-Wide.ttf'); }

        :root {
            --f1-red: #ff0000;
            --safety-yellow: #ffd000;
            --safety-green: #00d21d;
            --soft-red: #ff0000;
            --medium-yellow: #f9d71c;
            --hard-white: #ffffff;
            --inter-green: #00d21d;
            --wet-blue: #006aff;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #050505; color: white; overflow: hidden;
            display: flex; flex-direction: row; font-family: 'F1-Regular';
        }

        #leaderboard-wrapper {
            width: 180px; height: 94vh; margin: 3vh 0 3vh 20px;
            position: relative; z-index: 100;
        }

        #dynamic-stripe {
            position: absolute; left: -10px; top: 0; width: 6px; height: 0;
            transition: height 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s;
            z-index: 110; border-radius: 3px; opacity: 0;
        }

        #leaderboard {
            height: 100%; background: rgba(0,0,0,0.95);
            border: 1px solid #222; border-radius: 4px; overflow: hidden;
            display: flex; flex-direction: column;
        }

        .header { border-bottom: 2px solid var(--f1-red); padding: 8px 0; text-align: center; }
        .f1-logo { width: 70px; }
        .lap-info { background: #111; text-align: center; padding: 4px; font-size: 10px; color: #888; font-family: 'F1-Bold'; }

        #flag-panel {
            height: 0; overflow: hidden; transition: 0.4s;
            display: flex; flex-direction: column;
        }
        #flag-panel.active { height: 75px; border-bottom: 1px solid #333; }
        
        .flag-top { height: 35px; display: flex; align-items: center; justify-content: center; font-family: 'F1-Bold'; font-size: 14px; text-transform: uppercase; }
        .flag-bottom { flex-grow: 1; display: flex; align-items: center; justify-content: center; font-size: 14px; font-family: 'F1-Bold'; }

        .driver-list { flex-grow: 1; overflow-y: auto; scrollbar-width: none; }
        .driver-row { display: flex; align-items: center; height: 21px; background: #0a0a0c; margin-bottom: 1px; font-size: 9px; position: relative; }
        .pos { width: 20px; text-align: center; font-family: 'F1-Bold'; background: #000; height: 100%; display: flex; align-items: center; justify-content: center; }
        .team-color { width: 3px; height: 80%; margin: 0 4px; }
        .abbr { font-family: 'F1-Bold'; flex-grow: 1; }
        .interval { width: 45px; text-align: right; margin-right: 8px; color: #aaa; font-family: 'F1-Regular'; }
        
        .tire-letter { width: 12px; text-align: center; font-family: 'F1-Regular'; font-size: 10px; margin-right: 8px; }

        #track-container { flex-grow: 1; position: relative; display: flex; justify-content: center; align-items: center; }
        svg { width: 85%; height: 85%; }
        
        .track-path { fill: none; stroke: #151515; stroke-width: 11; stroke-linejoin: round; stroke-linecap: round; }
        .pit-path { fill: none; stroke: #333; stroke-width: 6; stroke-linejoin: round; stroke-linecap: round; }
        
        #sector-overlay { 
            fill: none; stroke-width: 12; stroke-linejoin: round; stroke-linecap: round; 
            transition: stroke-dasharray 0.8s ease-in-out, stroke 0.3s; 
        }

        @keyframes vsc-blink { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } }
        .blink-map { animation: vsc-blink 1s infinite; }

        #controls { position: absolute; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 4px; }
        button { background: #1a1a1a; color: white; border: 1px solid #333; padding: 5px 10px; cursor: pointer; font-family: 'F1-Bold'; font-size: 8.5px; border-radius: 4px; }
    </style>
</head>
<body>

<div id="leaderboard-wrapper">
    <div id="dynamic-stripe"></div>
    <div id="leaderboard">
        <div class="header"><img src="https://upload.wikimedia.org/wikipedia/commons/3/33/F1.svg" class="f1-logo"></div>
        <div class="lap-info">LAP 1 / 78</div>
        <div id="flag-panel">
            <div class="flag-top" id="f-title"></div>
            <div class="flag-bottom" id="f-content"></div>
        </div>
        <div class="driver-list" id="ui-grid"></div>
    </div>
</div>

<div id="track-container">

        <g id="car-layer"></g>
    </svg>
    <div id="controls">
        <button onclick="update('YELLOW', 1)">S1 YELLOW</button>
        <button onclick="update('YELLOW', 2)">S2 YELLOW</button>
        <button onclick="update('YELLOW', 3)">S3 YELLOW</button>
        <button onclick="update('GREEN')">GREEN</button>
        <button onclick="update('VSC')">VSC</button>
        <button onclick="update('SC')">SC</button>
        <button onclick="update('RED')">RED</button>
        <button onclick="update('NORMAL')">NORMAL</button>
    </div>
</div>

<script>
    const drivers = [
        {abbr: 'LEC', color: '#e80020', tire: 'S', tireColor: 'var(--soft-red)'}, 
        {abbr: 'NOR', color: '#ff8000', tire: 'M', tireColor: 'var(--medium-yellow)'},
        {abbr: 'HAM', color: '#e80020', tire: 'S', tireColor: 'var(--soft-red)'}, 
        {abbr: 'VER', color: '#3671C6', tire: 'H', tireColor: 'var(--hard-white)'},
        {abbr: 'PIA', color: '#ff8000', tire: 'M', tireColor: 'var(--medium-yellow)'}, 
        {abbr: 'RUS', color: '#27f4d2', tire: 'H', tireColor: 'var(--hard-white)'},
        {abbr: 'ANT', color: '#27f4d2', tire: 'S', tireColor: 'var(--soft-red)'}, 
        {abbr: 'ALO', color: '#229971', tire: 'M', tireColor: 'var(--medium-yellow)'},
        {abbr: 'SAI', color: '#64C4FF', tire: 'H', tireColor: 'var(--hard-white)'}, 
        {abbr: 'GAS', color: '#0093cc', tire: 'S', tireColor: 'var(--soft-red)'},
        {abbr: 'PER', color: '#3671C6', tire: 'M', tireColor: 'var(--medium-yellow)'}, 
        {abbr: 'ALB', color: '#64C4FF', tire: 'H', tireColor: 'var(--hard-white)'},
        {abbr: 'TSU', color: '#6692ff', tire: 'S', tireColor: 'var(--soft-red)'}, 
        {abbr: 'LAW', color: '#6692ff', tire: 'M', tireColor: 'var(--medium-yellow)'},
        {abbr: 'HUL', color: '#52e252', tire: 'H', tireColor: 'var(--hard-white)'}, 
        {abbr: 'BOR', color: '#52e252', tire: 'S', tireColor: 'var(--soft-red)'},
        {abbr: 'OCO', color: '#ffffff', tire: 'M', tireColor: 'var(--medium-yellow)'}, 
        {abbr: 'BEA', color: '#ffffff', tire: 'H', tireColor: 'var(--hard-white)'},
        {abbr: 'STR', color: '#229971', tire: 'S', tireColor: 'var(--soft-red)'}, 
        {abbr: 'COL', color: '#0093cc', tire: 'M', tireColor: 'var(--medium-yellow)'},
        {abbr: 'MAL', color: '#7a7a7a', tire: 'W', tireColor: 'var(--wet-blue)'}, 
        {abbr: 'LAT', color: '#1e3d59', tire: 'I', tireColor: 'var(--inter-green)'}
    ];

    const overlay = document.getElementById('sector-overlay');
    const pitPath = document.getElementById('pit-road');
    const pathLen = overlay.getTotalLength();
    const pitLen = pitPath.getTotalLength();
    let currentFlag = 'NORMAL';
    let yellowSector = null;
    let baseSpeed = 0.00065;
    let isRedFlag = false;

    function init() {
        const grid = document.getElementById('ui-grid');
        const cars = document.getElementById('car-layer');
        drivers.forEach((d, i) => {
            d.progress = 1 - (i * 0.04);
            d.pitProgress = 0;
            const interval = i === 0 ? "LEADER" : `+${(i * 0.8 + Math.random()).toFixed(3)}`;
            grid.innerHTML += `
                <div class="driver-row" id="row-${d.abbr}">
                    <div class="pos">${i+1}</div>
                    <div class="team-color" style="background:${d.color}"></div>
                    <div class="abbr">${d.abbr}</div>
                    <div class="interval">${interval}</div>
                    <div class="tire-letter" style="color:${d.tireColor}">${d.tire}</div>
                </div>`;
            
            const car = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            car.setAttribute("id", "car-"+d.abbr);
            car.setAttribute("r", "5");
            car.setAttribute("fill", d.color);
            cars.appendChild(car);
        });
        overlay.style.strokeDasharray = `0, ${pathLen}`;
    }

    function update(type, sec) {
        const stripe = document.getElementById('dynamic-stripe');
        const panel = document.getElementById('flag-panel');
        const title = document.getElementById('f-title');
        const cont = document.getElementById('f-content');

        currentFlag = type;
        yellowSector = sec || null;
        panel.classList.remove('active');
        overlay.classList.remove('blink-map');
        overlay.style.strokeDasharray = `0, ${pathLen}`;
        isRedFlag = false;

        setTimeout(() => {
            if(type === 'NORMAL') {
                stripe.style.height = "0"; stripe.style.opacity = "0"; baseSpeed = 0.00065;
            } else {
                stripe.style.opacity = "1"; stripe.style.height = "140px";
                
                if(type === 'YELLOW') {
                    title.innerText = 'YELLOW FLAG'; title.style.background = "var(--safety-yellow)"; title.style.color = "#000";
                    cont.innerHTML = `<span style="font-family:F1-Bold; color:var(--safety-yellow)">SECTOR</span> <span style="font-family:F1-Wide; color:var(--safety-yellow); margin-left:8px">${sec}</span>`;
                    stripe.style.background = "var(--safety-yellow)";
                    const sPart = pathLen / 3; overlay.style.stroke = "var(--safety-yellow)";
                    overlay.style.strokeDasharray = `${sPart}, ${pathLen}`; overlay.style.strokeDashoffset = `-${(sec-1) * sPart}`;
                } 
                else if(type === 'GREEN') {
                    title.innerText = 'GREEN FLAG'; title.style.background = "var(--safety-green)"; title.style.color = "#fff";
                    cont.innerText = 'TRACK CLEAR'; cont.style.color = "var(--safety-green)"; cont.style.fontSize = "16px";
                    stripe.style.background = "var(--safety-green)"; overlay.style.stroke = "var(--safety-green)";
                    overlay.style.strokeDasharray = `${pathLen}, ${pathLen}`; overlay.style.strokeDashoffset = "0";
                    baseSpeed = 0.00085; setTimeout(() => update('NORMAL'), 3000);
                } 
                else if(type === 'VSC') {
                    title.innerText = 'VIRTUAL'; title.style.background = "var(--safety-yellow)"; title.style.color = "#000";
                    cont.innerText = 'SAFETY CAR'; cont.style.background = "var(--safety-yellow)"; cont.style.color = "#000";
                    cont.style.fontSize = "16px";
                    stripe.style.background = "var(--safety-yellow)";
                    overlay.style.stroke = "var(--safety-yellow)"; overlay.style.strokeDasharray = `${pathLen}, ${pathLen}`;
                    overlay.classList.add('blink-map'); baseSpeed = 0.0002;
                } 
                else if(type === 'SC') {
                    title.innerText = 'SAFETY'; title.style.background = "var(--safety-yellow)"; title.style.color = "#000";
                    cont.innerText = 'CAR'; cont.style.background = "var(--safety-yellow)"; cont.style.color = "#000";
                    cont.style.fontSize = "18px";
                    stripe.style.background = "var(--safety-yellow)";
                    overlay.style.stroke = "var(--safety-yellow)"; overlay.style.strokeDasharray = `${pathLen}, ${pathLen}`;
                    baseSpeed = 0.0003;
                }
                else if(type === 'RED') {
                    title.innerText = 'RED FLAG'; 
                    title.style.background = "var(--f1-red)"; 
                    title.style.color = "#000"; // Siyah yapıldı
                    
                    cont.innerText = 'SESSION STOPPED'; 
                    cont.style.background = "var(--f1-red)"; 
                    cont.style.color = "#000"; // Siyah yapıldı
                    cont.style.fontSize = "14px";
                    
                    stripe.style.background = "var(--f1-red)";
                    overlay.style.stroke = "var(--f1-red)"; overlay.style.strokeDasharray = `${pathLen}, ${pathLen}`;
                    isRedFlag = true;
                }
                panel.classList.add('active');
            }
        }, 50);
    }

    function animate() {
        drivers.forEach((d, i) => {
            let pt;
            if (isRedFlag) {
                if (d.pitProgress < 1) d.pitProgress += 0.005;
                let stopPoint = (pitLen - (i * 12)) / pitLen;
                if (d.pitProgress > stopPoint) d.pitProgress = stopPoint;
                pt = pitPath.getPointAtLength(d.pitProgress * pitLen);
            } else {
                d.pitProgress = 0;
                let currentCarSpeed = baseSpeed;
                if (currentFlag === 'YELLOW' && yellowSector) {
                    const carSector = Math.floor(d.progress * 3) + 1;
                    if (carSector === yellowSector) currentCarSpeed = 0.0002;
                }
                d.progress += currentCarSpeed;
                if(d.progress > 1) d.progress = 0;
                pt = overlay.getPointAtLength(d.progress * pathLen);
            }
            const carEl = document.getElementById("car-"+d.abbr);
            if(carEl) {
                carEl.setAttribute("cx", pt.x);
                carEl.setAttribute("cy", pt.y);
            }
        });
        requestAnimationFrame(animate);
    }

    init(); animate();
</script>
</body>
</html>
